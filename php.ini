memory_limit = 256M
upload_max_filesize = 64M
post_max_size = 64M
max_execution_time = 300
max_input_time = 300

; Отладочные настройки для разработки
display_errors = On
display_startup_errors = On
error_reporting = E_ALL
log_errors = On

; Настройки сессии
session.cookie_secure = 0
session.cookie_samesite = "Lax"
